# Application Configuration
spring.application.name=demopg
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/tweeter_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SELECT 1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
bezkoder.app.jwtSecret=bezkoderSecretKeyForJWTTokenGenerationAndValidationPurpose
bezkoder.app.jwtExpirationMs=86400000

# Logging Configuration
logging.level.root=INFO
logging.level.com.postgres.demopg=DEBUG